<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AgriLien — Navbar Mockups</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #F1F5F9; display: flex; flex-direction: column; align-items: center; gap: 40px; padding: 40px 20px; }
  h1 { font-size: 22px; color: #0F172A; }
  .label { font-size: 14px; font-weight: 800; color: #64748B; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 8px; }
  .phone { width: 375px; height: 160px; background: #fff; border-radius: 24px; box-shadow: 0 8px 30px rgba(0,0,0,0.1); position: relative; overflow: hidden; display: flex; align-items: flex-end; }

  /* === OPTION A === */
  .nav-a { width: calc(100% - 32px); margin: 0 16px 16px; padding: 12px 20px; background: rgba(15,23,42,0.92); backdrop-filter: blur(20px); border-radius: 28px; display: flex; justify-content: space-around; align-items: center; border: 1px solid rgba(255,255,255,0.1); box-shadow: 0 8px 32px rgba(0,0,0,0.3); }
  .nav-a .item { display: flex; flex-direction: column; align-items: center; gap: 2px; color: #64748B; }
  .nav-a .item.active { color: #fff; }
  .nav-a .item.active .icon-wrap { background: #16A34A; border-radius: 50%; width: 44px; height: 44px; display: flex; align-items: center; justify-content: center; box-shadow: 0 0 20px rgba(22,163,74,0.5); }
  .nav-a .dot { width: 4px; height: 4px; border-radius: 50%; background: #16A34A; margin-top: 2px; }
  .nav-a svg { width: 22px; height: 22px; }
  .nav-a .badge { position: absolute; top: -4px; right: -6px; background: #EF4444; color: #fff; font-size: 9px; font-weight: 800; width: 16px; height: 16px; border-radius: 50%; display: flex; align-items: center; justify-content: center; }

  /* === OPTION B === */
  .phone-b { background: linear-gradient(to bottom, #E8F5E9, #fff); }
  .nav-b { width: 100%; padding: 10px 16px 14px; background: #fff; border-top: 1px solid #E5E7EB; display: flex; justify-content: space-around; align-items: flex-end; position: relative; }
  .nav-b .item { display: flex; flex-direction: column; align-items: center; gap: 3px; color: #9CA3AF; font-size: 10px; font-weight: 600; }
  .nav-b .item.active { color: #16A34A; }
  .nav-b .item.center { margin-top: -30px; }
  .nav-b .center-btn { width: 56px; height: 56px; border-radius: 50%; background: linear-gradient(135deg, #16A34A, #22C55E); display: flex; align-items: center; justify-content: center; box-shadow: 0 6px 20px rgba(22,163,74,0.4); border: 3px solid #fff; }
  .nav-b svg { width: 20px; height: 20px; }

  /* === OPTION C === */
  .nav-c { width: 100%; padding: 0 12px 14px; background: #fff; border-top: 1px solid #F1F5F9; display: flex; justify-content: space-around; align-items: center; position: relative; }
  .nav-c .item { display: flex; flex-direction: column; align-items: center; gap: 4px; color: #9CA3AF; font-size: 10px; font-weight: 600; padding-top: 14px; position: relative; }
  .nav-c .item.active { color: #16A34A; }
  .nav-c .item.active::before { content: ''; position: absolute; top: 0; left: 50%; transform: translateX(-50%); width: 32px; height: 4px; background: #16A34A; border-radius: 0 0 4px 4px; }
  .nav-c svg { width: 22px; height: 22px; }
</style>
</head>
<body>

<h1>🌿 AgriLien — Choix du Design Navbar</h1>

<!-- OPTION A -->
<div>
  <p class="label">Option A — "Floating Pill" (Dark Premium)</p>
  <div class="phone" style="background: linear-gradient(180deg, #1a2332, #0F172A);">
    <div class="nav-a">
      <div class="item active">
        <div class="icon-wrap">
          <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M3 12l9-9 9 9M5 10v10a1 1 0 001 1h3a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1h3a1 1 0 001-1V10"/></svg>
        </div>
        <div class="dot"></div>
      </div>
      <div class="item">
        <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
      </div>
      <div class="item" style="position:relative;">
        <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 002 1.61h9.72a2 2 0 002-1.61L23 6H6"/></svg>
        <div class="badge">3</div>
      </div>
      <div class="item">
        <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"/><circle cx="12" cy="10" r="3"/></svg>
      </div>
      <div class="item">
        <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      </div>
    </div>
  </div>
</div>

<!-- OPTION B -->
<div>
  <p class="label">Option B — "Raised Center" (FAB Central)</p>
  <div class="phone phone-b">
    <div class="nav-b">
      <div class="item active">
        <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M3 12l9-9 9 9M5 10v10a1 1 0 001 1h3a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1h3a1 1 0 001-1V10"/></svg>
        <span>Accueil</span>
      </div>
      <div class="item">
        <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
        <span>Recherche</span>
      </div>
      <div class="item center">
        <div class="center-btn">
          <svg fill="none" stroke="#fff" stroke-width="2" viewBox="0 0 24 24"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 002 1.61h9.72a2 2 0 002-1.61L23 6H6"/></svg>
        </div>
        <span style="margin-top:4px; color:#16A34A; font-weight:800;">Panier</span>
      </div>
      <div class="item">
        <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"/><circle cx="12" cy="10" r="3"/></svg>
        <span>Carte</span>
      </div>
      <div class="item">
        <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        <span>Profil</span>
      </div>
    </div>
  </div>
</div>

<!-- OPTION C -->
<div>
  <p class="label">Option C — "Indicator Slide" (Apple Style)</p>
  <div class="phone">
    <div class="nav-c">
      <div class="item active">
        <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M3 12l9-9 9 9M5 10v10a1 1 0 001 1h3a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1h3a1 1 0 001-1V10"/></svg>
        <span>Accueil</span>
      </div>
      <div class="item">
        <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
        <span>Recherche</span>
      </div>
      <div class="item">
        <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 002 1.61h9.72a2 2 0 002-1.61L23 6H6"/></svg>
        <span>Panier</span>
      </div>
      <div class="item">
        <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"/><circle cx="12" cy="10" r="3"/></svg>
        <span>Carte</span>
      </div>
      <div class="item">
        <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        <span>Profil</span>
      </div>
    </div>
  </div>
</div>

</body>
</html>
